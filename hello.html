<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरी पहली वेबसाइट</title>
    <style>
        /* CSS: वेबसाइट को सुंदर बनाने के लिए */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #0070f3;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        main {
            padding: 40px;
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #0051b3;
        }
        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        स्वागत है मेरी वेबसाइट पर! 😊
    </header>

    <main>
        <h2>यह मेरी पहली वेबसाइट है</h2>
        <p>मैं इस वेबसाइट को Vercel पर लाइव (Host) करने जा रहा हूँ। यह बहुत ही आसान और तेज़ है।</p>
        <button onclick="alert('नमस्ते! क्लिक करने के लिए धन्यवाद।')">यहाँ क्लिक करें</button>
    </main>

    <footer>
        © 2026 मेरी वेबसाइट | Vercel द्वारा संचालित
    </footer>

</body>
</html>
